<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="bt-bar" class="highlight">
        <button class="flag-button about-bt highlight" data-language="en">EN</button>
        <button class="flag-button about-bt highlight" data-language="ar">AR</button>

        <button id="bt-ret-main"
                class="about-bt highlight"
                onclick="window.location.href='index.html'">
            -->
        </button>
    </div>

    <div class="products-container">

        <!-- Product 1 -->
        <div class="card product-box highlight">

            <img
                id="product1-img"
                class="highlight product-img"
                src="product1-img.jpg"
                alt="Product 1">

            <h2 id="prodct-name" class="name">سبحة كريستال</h2>

            <h4 id="product-des">السعر: 40 ج.م</h4>

            <textarea id="body1" hidden>buying request</textarea>

            <button
                id="bt-buy1"
                class="about-bt cl-buy highlight"
                onclick="
const phone = prompt('Enter your phone number:');
const name = prompt('Enter your name');
if (phone !== null && phone.trim() !== '') {
document.getElementById('body1').value =
'Button: ' + this.id + '\nPhone: ' + phone + '\nName: ' + name;
sendEmail();
}">
                buy
            </button>

        </div>
